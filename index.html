<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <title>Daily Quran Verses</title>
  </head>
  <body>
    <div class="container">
      <h1>Daily Quran Verse</h1>
      
      <div class="card">
        <h3>Arabic</h3>
        <p id="arabic" class="arabic-text"></p>
        <h3>English Translation</h3>
        <p id="english" class="english-text"></p>
        <p id="reference" class="reference-text"></p>
        <div class="audio-container">
          <h3>Full Surah Recitation</h3>
          <audio id="audio" controls></audio>
        </div>
      </div>

      <button class="btn" onclick="showVerse()">Get New Verse</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
